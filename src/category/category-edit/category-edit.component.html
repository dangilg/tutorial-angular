
<div class="container">
  @if(editMode){
    <h1>Modificar categoría</h1>
  }
  @else{
    <h1>Crear categoría</h1>
  }
    <form #categoryEditForm="ngForm">
        <mat-form-field>
            <mat-label>Identificador</mat-label>
            <input type="text" matInput placeholder="Identificador" [(ngModel)]="id" name="id" disabled>
        </mat-form-field>

        <mat-form-field>
            <mat-label>Nombre</mat-label>
            <input type="text" matInput placeholder="Nombre de categoría" [(ngModel)]="category.name" name="name" required>
            <mat-error>El nombre no puede estar vacío</mat-error>
        </mat-form-field>
    </form>

    <div class="buttons">
        <button mat-stroked-button (click)="onClose()">Cerrar</button>
        <button mat-flat-button color="primary" (click)="onSave()" [disabled]="categoryEditForm.invalid || categoryEditForm.pristine">Guardar</button>
    </div>
</div>
