<mat-toolbar>
    <mat-toolbar-row>
        <div class="header_container">
            <div class="header_title">
                <mat-icon>storefront</mat-icon> Ludoteca Tan
            </div>

            <div class="header_separator">|</div>

            <div class="header_menu">
                <div class="header_button">
                    <a routerLink="/games" routerLinkActive="active">Catálogo</a>
                </div>
                <div class="header_button">
                    <a routerLink="/categories" routerLinkActive="active">Categorías</a>
                </div>
                <div class="header_button">
                    <a routerLink="/authors" routerLinkActive="active">Autores</a>
                </div>
            </div>

            @if(isLoggedIn$|async){
              <div class="header_login">
                <div class="header_button">
                  <mat-icon>logout</mat-icon>
                    <a (click)="logOut()" routerLinkActive="active">
                      Log Out
                    </a>
                </div>
              </div>
            }
            @else{
            <div class="header_login">
                <div class="header_button">
                  <mat-icon>account_circle</mat-icon>
                  <!-- Hay q cambiar las rutas para q yambien se aplique el cambio de css-->
                  <a (click)="openSignInModal()" routerLinkActive="active">
                    Sign in
                  </a>
                </div>
                <div class="header_button">
                  <mat-icon>login</mat-icon>
                  <a (click)="openLogInModal()" routerLinkActive="active">
                    Log in
                  </a>
                </div>
            </div>
          }
        </div>
    </mat-toolbar-row>
</mat-toolbar>
